<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>教学模式 · 档案侦探</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20" />
</head>
<body>
  <div id="app">
    <div id="game-container">
      <!-- 顶部状态栏 -->
      <div id="game-header">
        <button id="btn-back">← 返回</button>
        <div id="timer">00:00</div>
        <button id="btn-setting" class="header-icon-btn">⚙️</button>
      </div>

      <h2 id="level-title">教学关卡</h2>
      <p id="level-goal"></p>

      <!-- 盘面 -->
      <div id="board-area">
        <canvas id="gameCanvas"></canvas>
      </div>

      <!-- 工具栏 -->
      <div id="toolbar">
        <button id="btn-undo" title="撤销">↶</button>
        <button id="btn-erase" title="擦除">⌫</button>
        <button id="btn-candidate" title="候选">✏️</button>
        <button id="btn-hint" title="提示">💡</button>
        <button id="btn-45rule" title="算珠">🧮</button>
        <button id="btn-restart" title="重来">🔄</button>
      </div>

      <!-- 透视面板（随导航切换） -->
      <div id="perspective-panel" style="display:none; padding: 6px 12px; background: #f0f9ff; border-radius: 8px; margin: 4px 0; font-size: 12px;">
        <div style="display: flex; gap: 8px; justify-content: center;">
          <span id="persp-row">行 <span id="persp-row-nums" style="font-weight:700;color:#ef4444;">-</span></span>
          <span id="persp-col">列 <span id="persp-col-nums" style="font-weight:700;color:#22c55e;">-</span></span>
          <span id="persp-box">宫 <span id="persp-box-nums" style="font-weight:700;color:#f59e0b;">-</span></span>
        </div>
      </div>

      <!-- 数字键盘（动态生成） -->
      <div id="num-pad"></div>
      <!-- 连填提示（第一次使用后自动隐藏） -->
      <p id="quick-fill-hint" class="quick-fill-hint">💡 不选格子→点数字→再点空格，快速填入</p>
    </div>
  </div>

  <!-- 暂停蒙层 -->
  <div id="pause-overlay">
    <div class="pause-card">
      <h3>⏸ 游戏暂停</h3>
      <p>点击下方按钮继续游戏</p>
      <button id="btn-resume">继续游戏</button>
    </div>
  </div>

  <!-- 调试面板 -->
  <div id="debug-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.85); padding:20px; overflow-y:auto; font-family:monospace; font-size:12px; color:#0f0;">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <span style="color:#fff; font-size:16px;">🛠 诊断面板</span>
      <button id="btn-debug-close" style="background:#ef4444; color:#fff; border:none; padding:4px 12px; border-radius:4px; cursor:pointer;">✕</button>
    </div>
    <div id="debug-log" style="white-space:pre-wrap; line-height:1.6;"></div>
  </div>
  <style>
    #debug-btn { position:fixed; bottom:10px; right:10px; z-index:10000; background:#3b82f6; color:#fff; border:none; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  </style>
  <button id="debug-btn" onclick="toggleDebug()">🐛</button>
  <script>
    let _debugLogs = [];
    let _origLog = console.log;
    function _updateDebugLog() {
      const el = document.getElementById('debug-log');
      if (el) el.textContent = _debugLogs.join('\n');
    }
    console.log = function() {
      const msg = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
      _debugLogs.push(msg);
      if (_debugLogs.length > 200) _debugLogs.shift();
      _origLog.apply(console, arguments);
      _updateDebugLog();
    };
    function toggleDebug() {
      const p = document.getElementById('debug-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
      _updateDebugLog();
    }
    window.addEventListener('load', function() {
      document.getElementById('btn-debug-close').addEventListener('click', toggleDebug);
    });
  </script>

  <!-- 通关弹窗 -->
  <div id="complete-overlay">
    <div class="complete-card">
      <div class="trophy">🏆</div>
      <h3>恭喜通关！</h3>
      <div id="complete-stars" style="font-size: 28px; margin: 10px 0; color: #f59e0b;">★★★</div>
      <div id="complete-time" class="complete-time">用时 00:00</div>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-complete-back">返回关卡</button>
        <button class="btn-primary" id="btn-complete-next">下一关</button>
      </div>
    </div>
  </div>

  <!-- 45法则计算器弹窗 -->
  <div id="rule45-overlay">
    <div class="rule45-card">
      <div class="rule45-header">
        <h3>🧮 45法则计算器</h3>
        <button id="btn-rule45-close" class="rule45-close">×</button>
      </div>
      <div class="rule45-body">
        <div class="rule45-input-row">
          <div class="rule45-input-group">
            <label>格子数</label>
            <input type="number" id="rule45-cellcount" min="1" max="9" value="2" />
          </div>
          <div class="rule45-input-group">
            <label>目标和</label>
            <input type="number" id="rule45-targetsum" min="1" max="45" value="10" />
          </div>
        </div>
        <div class="rule45-input-row">
          <div class="rule45-input-group">
            <label>必含数字</label>
            <div class="rule45-num-picker" id="rule45-must"></div>
          </div>
        </div>
        <div class="rule45-input-row">
          <div class="rule45-input-group">
            <label>排除数字</label>
            <div class="rule45-num-picker" id="rule45-exclude"></div>
          </div>
        </div>
        <div class="rule45-result">
          <div class="rule45-result-header">
            <span>可能的组合</span>
            <span id="rule45-count" class="rule45-count">0 种</span>
          </div>
          <div id="rule45-combinations" class="rule45-combinations">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settings-overlay">
    <div class="settings-card">
      <div class="settings-header">
        <h3>⚙️ 设置</h3>
        <button id="btn-settings-close" class="settings-close">×</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <h4>显示</h4>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">冲突标红</span>
              <span class="setting-desc">填错数字时标红提示</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-conflict-red" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">同行高亮</span>
              <span class="setting-desc">选中格子时高亮整行</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-highlight-row" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">同列高亮</span>
              <span class="setting-desc">选中格子时高亮整列</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-highlight-col" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">同宫高亮</span>
              <span class="setting-desc">选中格子时高亮整宫</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-highlight-box" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">同数字高亮</span>
              <span class="setting-desc">选中数字时高亮所有相同数字</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-highlight-samenum" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">同笼高亮</span>
              <span class="setting-desc">选中格子时高亮所属笼子</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-highlight-samecage" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="settings-section">
          <h4>操作</h4>
          <div class="setting-item">
            <div class="setting-info">
              <span class="setting-name">自动清除关联候选</span>
              <span class="setting-desc">填数后自动清除行/列/宫/笼的关联候选</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-auto-clear" checked />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="utils/storage.js?v=21"></script>
  <script src="game.js?v=21"></script>
  <script src="renderer.js?v=21"></script>
  <script src="story.js?v=21"></script>
  <script src="guide-manager.js?v=21"></script>
  <script src="guide-battle.js?v=21"></script>
  <script src="guide.js?v=21"></script>
</body>
</html>
