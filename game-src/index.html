<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>档案侦探 · 笼中密码</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="app">
    <div id="game-container">
      <!-- 顶部状态栏 -->
      <div id="game-header">
        <button id="btn-back">← 关卡</button>
        <div id="timer">00:00</div>
      </div>

      <h2 id="level-title" style="text-align:center; margin: 0 0 12px 0; color: #475569;">档案 #01 · 加密来信</h2>
      <canvas id="gameCanvas"></canvas>

      <!-- 工具栏 -->
      <div id="toolbar">
        <button id="btn-undo">撤销</button>
        <button id="btn-erase">擦除</button>
        <button id="btn-candidate">候选</button>
        <button id="btn-hint">提示</button>
        <button id="btn-setting">设置</button>
      </div>

      <!-- 数字键盘 -->
      <div id="num-pad">
        <button class="num-btn" data-num="1">1</button>
        <button class="num-btn" data-num="2">2</button>
        <button class="num-btn" data-num="3">3</button>
        <button class="num-btn" data-num="4">4</button>
        <button class="num-btn" data-num="5">5</button>
        <button class="num-btn" data-num="6">6</button>
        <button class="num-btn" data-num="7">7</button>
        <button class="num-btn" data-num="8">8</button>
        <button class="num-btn" data-num="9">9</button>
      </div>
    </div>
  </div>

  <!-- 暂停蒙层 -->
  <div id="pause-overlay">
    <div class="pause-card">
      <h3>⏸ 游戏暂停</h3>
      <p>点击下方按钮继续游戏</p>
      <button id="btn-resume">继续游戏</button>
    </div>
  </div>

  <!-- 通关弹窗 -->
  <div id="complete-overlay">
    <div class="complete-card">
      <div class="trophy">🏆</div>
      <h3>恭喜通关！</h3>
      <div id="complete-time" class="complete-time">用时 00:00</div>
      <div class="btn-row">
        <button class="btn-secondary" id="btn-complete-back">返回关卡</button>
        <button class="btn-primary" id="btn-complete-next">下一关</button>
      </div>
    </div>
  </div>

  <script src="utils/storage.js"></script>
  <script src="game.js"></script>
  <script src="renderer.js"></script>
  <script src="main.js"></script>
</body>
</html>
