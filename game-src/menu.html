<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title data-i18n="ui.titles.menuPage">档案侦探 · 笼中密码</title>
  <link rel="icon" type="image/jpeg" href="assets/images/favicon.jpg" />
  <link rel="stylesheet" href="assets/css/style.css?v=38" />
  <style>
    /* 主菜单页面样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 背景装饰 */
    .bg-grid {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .bg-glow {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-glow.g1 { background: #8b5cf6; top: -100px; left: -100px; }
    .bg-glow.g2 { background: #3b82f6; bottom: -100px; right: -100px; }
    .bg-glow.g3 { background: #f59e0b; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.08; }

    /* 主容器 */
    .menu-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* 游戏标题 */
    .game-logo {
      text-align: center;
      margin-bottom: 12px;
    }

    .game-logo .logo-icon {
      font-size: 64px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 20px rgba(139,92,246,0.4));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .game-logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 4px;
      margin-bottom: 4px;
      text-shadow: 0 2px 10px rgba(139,92,246,0.3);
    }

    .game-logo .subtitle {
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 2px;
    }

    /* 统计条 */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin: 20px 0 28px;
      padding: 12px 20px;
      background: rgba(30,41,59,0.8);
      border: 1px solid rgba(148,163,184,0.1);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fbbf24;
    }

    .stat-label {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    .stat-divider {
      width: 1px;
      background: rgba(148,163,184,0.15);
    }

    /* 菜单按钮 */
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .menu-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      color: #f8fafc;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      text-align: left;
    }

    .menu-btn:active {
      transform: scale(0.97);
    }

    .menu-btn .btn-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .menu-btn .btn-text {
      flex: 1;
    }

    .menu-btn .btn-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .menu-btn .btn-desc {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.7;
    }

    .menu-btn .btn-arrow {
      font-size: 20px;
      opacity: 0.5;
      transition: transform 0.25s;
    }

    .menu-btn:hover .btn-arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* 故事模式按钮 */
    .btn-story {
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      box-shadow: 0 8px 30px rgba(124,58,237,0.3);
    }
    .btn-story .btn-icon {
      background: rgba(255,255,255,0.15);
    }

    /* 自由模式按钮 */
    .btn-free {
      background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      box-shadow: 0 8px 30px rgba(14,165,233,0.3);
    }
    .btn-free .btn-icon {
      background: rgba(255,255,255,0.15);
    }

    /* 对战模式按钮 */
    .btn-battle {
      background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
      box-shadow: 0 8px 30px rgba(239,68,68,0.3);
    }
    .btn-battle .btn-icon {
      background: rgba(255,255,255,0.15);
    }

    /* 设置按钮 */
    .btn-settings {
      background: rgba(30,41,59,0.9);
      border: 1px solid rgba(148,163,184,0.15);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn-settings .btn-icon {
      background: rgba(148,163,184,0.1);
    }

    /* 底部版本号 */
    .version-info {
      position: absolute;
      bottom: 16px;
      font-size: 11px;
      color: #475569;
      letter-spacing: 1px;
    }

    /* 进度徽章动画 */
    .menu-btn .btn-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: #fbbf24;
      color: #78350f;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      animation: pulse-badge 2s infinite;
    }

    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* 新游戏提示 */
    .new-hint {
      font-size: 10px;
      background: #22c55e;
      color: white;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>
  <div class="bg-glow g3"></div>

  <div class="menu-container">
    <!-- Logo 区域 -->
    <div class="game-logo">
      <div class="logo-icon" data-i18n="ui.menu.logo">🔐</div>
      <h1 data-i18n="ui.menu.gameTitle">笼中密码</h1>
      <div class="subtitle" data-i18n="ui.menu.subtitle">档案侦探 · KILLER SUDOKU</div>
    </div>

    <!-- 统计条 -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <div class="stat-value" id="statCompleted">0</div>
        <div class="stat-label" data-i18n="ui.menu.statsCompleted">已通关</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statBadges">0</div>
        <div class="stat-label" data-i18n="ui.menu.statsBadges">徽章</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-value" id="statTime">0m</div>
        <div class="stat-label" data-i18n="ui.menu.statsTotalTime">总用时</div>
      </div>
    </div>

    <!-- 菜单按钮 -->
    <div class="menu-buttons">
      <!-- 故事模式 -->
      <a href="chapters.html" class="menu-btn btn-story">
        <div class="btn-icon">📖</div>
        <div class="btn-text">
          <div class="btn-title" data-i18n="ui.menu.storyMode">故事模式</div>
          <div class="btn-desc" data-i18n="ui.menu.storyModeDesc">跟随剧情，学习杀手数独技巧</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>

      <!-- 自由模式 -->
      <a href="free-play.html" class="menu-btn btn-free">
        <div class="btn-icon">🧩</div>
        <div class="btn-text">
          <div class="btn-title" data-i18n="ui.menu.freeMode">数独谜题</div>
          <div class="btn-desc" data-i18n="ui.menu.freeModeDesc">300道精选谜题，三种难度</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>

      <!-- 设置 -->
      <a href="options.html" class="menu-btn btn-settings">
        <div class="btn-icon">⚙️</div>
        <div class="btn-text">
          <div class="btn-title" data-i18n="ui.menu.settings">设置</div>
          <div class="btn-desc" data-i18n="ui.menu.settingsDesc">音乐、音效、进度管理</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>
    </div>
  </div>

  <div class="version-info" data-i18n="ui.menu.version">v1.0.0</div>

  <script src="config.js?v=1"></script>
  <script src="platform.js?v=1"></script>
  <script src="resource-manager.js?v=1"></script>
  <script src="utils/audio.js?v=50"></script>
  <script>if (typeof AudioManager !== 'undefined') { AudioManager.init(); }</script>
  <script src="utils/storage.js?v=39"></script>
  <script src="utils/i18n.js?v=39"></script>
  <script src="scripts/midi-bgm.js?v=4"></script>
  <script src="utils/bgm-bridge.js?v=1"></script>
  <script>if (typeof BGMEngine !== 'undefined') BGMEngine.init();</script>
  <script>
    // 初始化i18n
    (async function() {
      await I18N.init();
    })();

    // 加载统计数据
    function loadStats() {
      try {
        const stats = Storage.getStats();
        const badges = Storage.getTeachingBadgesAll();
        const badgeCount = Object.values(badges).filter(b => b && b.earned).length;

        // 计算已通关数（故事模式+自由模式）
        let totalCompleted = stats.totalCompleted || 0;
        const teachingComplete = Storage.getTeachingCompleteAll();
        totalCompleted += Object.keys(teachingComplete).length;

        document.getElementById('statCompleted').textContent = totalCompleted;
        document.getElementById('statBadges').textContent = badgeCount;

        // 格式化总时间
        const totalSec = stats.totalTime || 0;
        const hours = Math.floor(totalSec / 3600);
        const mins = Math.floor((totalSec % 3600) / 60);
        document.getElementById('statTime').textContent = hours > 0 ? `${hours}h${mins}m` : `${mins}m`;
      } catch(e) {
        console.warn('加载统计失败:', e);
      }
    }

    loadStats();

    // 按钮音效
    document.querySelectorAll('.menu-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (typeof AudioManager !== 'undefined') {
          AudioManager.playClick();
        }
      });
    });

    // 启动菜单BGM
    (function startMenuBGM() {
      const startBGM = () => {
        if (typeof BGMEngine !== 'undefined') {
          BGMEngine.playMenu();
        }
        document.removeEventListener('click', startBGM);
        document.removeEventListener('touchstart', startBGM);
        document.removeEventListener('keydown', startBGM);
      };
      document.addEventListener('click', startBGM, { once: true });
      document.addEventListener('touchstart', startBGM, { once: true });
      document.addEventListener('keydown', startBGM, { once: true });
    })();
  </script>
</body>
</html>
